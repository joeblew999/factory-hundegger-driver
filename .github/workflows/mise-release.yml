name: mise release
# Generated by `mise run mise:repo:bootstrap --release`. On tag push, each OS
# builds its own arch (no cross-compile) and attaches binaries to the release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    uses: joeblew999/.github/.github/workflows/reusable-mise-release.yml@v0.67.1
    with:
      os-matrix: '["ubuntu-latest", "macos-latest", "windows-latest"]'
