#:schema https://mise.jdx.dev/schema/mise.json
# factory-btlx — consumes the joeblew999/.github shared mise task
# library. `mise run ci` is the WHOLE of CI, and runs identically on your machine
# and on the GitHub matrix (ubuntu + macOS + windows). See the .github README.
#
# Rust is owned by rust-toolchain.toml (rustup), NEVER mise — `ci:check-global`
# enforces this. Global tools (nu, gh, git-cliff) come from
# `mise run mise:global:bootstrap` (once per machine).

[task_config]
includes = [
  "git::https://github.com/joeblew999/.github.git//tasks/mise.toml?ref=v0.67.1",
  "git::https://github.com/joeblew999/.github.git//tasks/ci.toml?ref=v0.67.1",
  "git::https://github.com/joeblew999/.github.git//tasks/tool-rust.toml?ref=v0.67.1",
  "git::https://github.com/joeblew999/.github.git//tasks/release.toml?ref=v0.67.1",
]

# ── The control panel: this list IS our CI ────────────────────────────────────
#   bootstrap-check — re-runs mise:repo:bootstrap and fails if the generated
#                     workflows drifted from what's committed.
#   rust:test       — cargo test --all-targets (compiles the CLI for THIS OS, so
#                     the matrix builds a linux/macOS/windows binary each).
#   smoke           — run the built tool on a real machine .btlx (proves it reads
#                     real files, on every OS).
# `validate` is a LOCAL check (it needs xmllint, which isn't on the runners) — it is
# deliberately NOT in this list. CI proves the code via rust:test + smoke.
[tasks.ci]
depends = ["bootstrap-check", "rust:test", "smoke"]

# ── Tuning — bootstrap READS this and projects it into .github/workflows/ ──────
# Windows is in the RELEASE matrix on purpose: Hundegger Cambium is Windows, so a
# factory needs the .exe.
[env]
CI_OS_MATRIX         = '["ubuntu-latest", "macos-latest", "windows-latest"]'   # which OSes CI verifies on
CI_RELEASE           = "true"                                                  # publish binaries on a git TAG
CI_RELEASE_OS_MATRIX = '["ubuntu-latest", "macos-latest", "windows-latest"]'   # which OSes publish (incl. windows for Cambium)

# `dist` is the per-OS build task the release workflow runs on a tag. It builds the
# release binary and stages it in the layout `release:pack` tars up:
#   dist/<name>_<ver>_<os>_<arch>/<bin>
[tasks.dist]
run = '''
#!/usr/bin/env nu
def main [] {
  ^cargo build --release --bin btlx
  # On a tag build use the tag (v0.1.1 -> 0.1.1) so archive names match the release;
  # fall back to Cargo.toml version locally.
  let tag  = ($env.GITHUB_REF_NAME? | default "" | str replace -r '^v' '')
  let ver  = (if ($tag | is-empty) { open Cargo.toml | get package.version } else { $tag })
  let os   = $nu.os-info.name                                      # linux | macos | windows
  let arch = $nu.os-info.arch                                      # x86_64 | aarch64
  let bin  = (if $os == "windows" { "btlx.exe" } else { "btlx" })
  let d    = $"dist/btlx_($ver)_($os)_($arch)"
  mkdir $d
  cp ($"target/release/($bin)") ($d | path join $bin)
  print $"✓ staged ($d)/($bin)"
}
'''

# Prove the built tool reads a real machine file — runs local AND on every OS in CI.
[tasks.smoke]
run = '''
#!/usr/bin/env nu
def main [] {
  ^cargo run --release --bin btlx -- inspect fixtures/samples/lignocam-hackathon.btlx
}
'''

# ── Dev-facing tasks — the interface is `mise run`, never raw cargo ────────────

# Run the tool on any .btlx file.   mise run inspect -- path/to/file.btlx
[tasks.inspect]
run = '''
#!/usr/bin/env nu
def main [file: string] {
  ^cargo run --quiet --release --bin btlx -- inspect $file
}
'''

# Print a sample BTLx document.   mise run demo
[tasks.demo]
run = '''
#!/usr/bin/env nu
def main [] {
  ^cargo run --quiet --release --bin btlx -- demo
}
'''

# Local check: emit a fresh sample to a TEMP file and validate it against the real
# BTLx XSD. Never touches the committed fixture (which tests read via include_str!),
# so it's safe even though mise runs tasks in parallel. Needs xmllint.
#   mise run validate
[tasks.validate]
run = '''
#!/usr/bin/env nu
def main [] {
  if (which xmllint | is-empty) {
    print "• xmllint not installed — install libxml2 to run this check"
    return
  }
  let tmp = (mktemp --suffix .btlx)
  ^cargo run --quiet --release --example emit | save --force --raw $tmp
  ^xmllint --noout --schema fixtures/schema/BTLx_2_3_1.offline.xsd $tmp
  rm --force $tmp
  print "✓ emitted BTLx validates against the design2machine 2.3.1 schema"
}
'''

# Fetch the BTLx XSDs from design2machine and regenerate the offline (X3D-stripped)
# copies we validate against. Pure nushell — no curl/sed.   mise run schema
[tasks.schema]
run = '''
#!/usr/bin/env nu
# Produce an offline-validatable XSD: the canonical schema <xs:include>s an external
# X3D schema over the network (blocks offline xmllint). We never emit <Shape> (the
# only X3D user), so strip the include, the Shape element, and the unused ShapeType.
def offline [src: string, dst: string] {
  mut out = []
  mut skip = false
  for line in (open --raw $src | decode utf-8 | lines) {
    if ($line | str contains "web3d.org/specifications/x3d") { continue }
    if ($line | str contains '<xs:element name="Shape" type="ShapeType"') { continue }
    if ($line | str contains '<xs:complexType name="ShapeType">') { $skip = true; continue }
    if $skip {
      if ($line | str contains "</xs:complexType>") { $skip = false }
      continue
    }
    $out = ($out | append $line)
  }
  $out | str join (char newline) | save --force $dst
  print $"✓ ($dst)"
}

def main [] {
  let base = "https://www.design2machine.com/btlx"
  for v in ["2_3_1", "2_0_0"] {
    let xsd = $"fixtures/schema/BTLx_($v).xsd"
    # --raw: keep the XSD as text; without it nushell parses the XML into a record.
    http get --raw $"($base)/BTLx_($v).xsd" | save --force --raw $xsd
    print $"✓ ($xsd)  ← ($base)/BTLx_($v).xsd"
  }
  offline "fixtures/schema/BTLx_2_3_1.xsd" "fixtures/schema/BTLx_2_3_1.offline.xsd"
  print "done — canonical XSDs from design2machine.com; offline copy regenerated"
}
'''

# Regenerate the reference/machines.md table from reference/machines.jsonl (the
# source of truth). Pure nushell.   mise run machines
[tasks.machines]
run = '''
#!/usr/bin/env nu
def main [] {
  let rows = (open reference/machines.jsonl | lines | where {|l| ($l | str trim | is-not-empty)} | each {|l| $l | from json })
  mut out = []
  for mfr in ($rows | get manufacturer | uniq) {
    let mrows = ($rows | where manufacturer == $mfr)
    $out = ($out | append [$"### ($mfr)" "" "| Family | Model | Controller | Interchange in | Notes |" "|--------|-------|------------|----------------|-------|"])
    for r in $mrows {
      let fmt = (if $r.format_confirmed {
        if (($r.format_via | default "") | is-empty) { $r.format } else { $"($r.format) \(via ($r.format_via)\)" }
      } else { "*(to confirm)*" })
      $out = ($out | append $"| ($r.family) | ($r.model) | ($r.controller) | ($fmt) | ($r.notes) |")
    }
    $out = ($out | append "")
  }
  let table = ($out | str join (char newline))
  let md = (open reference/machines.md --raw | decode utf-8)
  let before = ($md | split row "<!-- gen:machines -->" | get 0)
  let after = ($md | split row "<!-- /gen:machines -->" | get 1)
  $"($before)<!-- gen:machines -->\n\n($table)\n<!-- /gen:machines -->($after)" | save --force reference/machines.md
  print $"✓ regenerated reference/machines.md table from ($rows | length) machines"
}
'''

# Fail if .github/workflows/ drifted from `mise run mise:repo:bootstrap` — keeps the
# generated CI honest against the shared bootstrap. (.gitattributes pins eol=lf so
# the git compare is identical on Windows.)
[tasks.bootstrap-check]
run = '''
#!/usr/bin/env nu
def main [] {
  ^mise run mise:repo:bootstrap
  let dirty = (^git status --porcelain .github/workflows | str trim)
  if ($dirty | is-not-empty) {
    print --stderr "✗ .github/workflows/ drifted — run `mise run mise:repo:bootstrap` and commit:"
    ^git --no-pager diff -- .github/workflows
    exit 1
  }
  print "✓ workflows in sync with mise:repo:bootstrap"
}
'''

# Download + run the published binary for THIS OS/arch (release assets are public).
#   mise run run-bin              # latest release
#   mise run run-bin -- v0.1.0    # a specific tag
[tasks.run-bin]
run = '''
#!/usr/bin/env nu
def main [tag?: string] {
  let t    = ($tag | default (^gh release view --json tagName | from json | get tagName))
  let os   = $nu.os-info.name
  let arch = $nu.os-info.arch
  let dir  = (mktemp -d)
  ^gh release download $t --pattern $"btlx_*_($os)_($arch).tar.gz" --dir $dir --clobber
  let tgz = (ls $dir | where name =~ 'tar.gz' | get 0.name)
  ^tar -xzf $tgz -C $dir
  let bin = ($dir | path join (if $os == "windows" { "btlx.exe" } else { "btlx" }))
  print $"→ running the ($t) binary for ($os)/($arch):"
  ^$bin demo
  rm -rf $dir
}
'''
